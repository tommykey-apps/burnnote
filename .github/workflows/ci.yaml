name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ hashFiles('api/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: api

      - name: Run tests
        run: php artisan test
        working-directory: api

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        working-directory: web

  e2e-web:
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    env:
      AWS_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DYNAMODB_ENDPOINT: http://127.0.0.1:8000
      DYNAMODB_TABLE: burnnote
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, bcmath, intl
          coverage: none
          tools: composer:v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist
        working-directory: api

      - name: Install Node deps
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web

      - name: Create DynamoDB table
        run: |
          aws dynamodb create-table \
            --table-name burnnote \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://127.0.0.1:8000 \
            --region ap-northeast-1

      - name: Create .env for artisan serve
        run: |
          cat > .env <<EOF
          APP_NAME=burnnote
          APP_ENV=testing
          APP_KEY=base64:$(openssl rand -base64 32)
          APP_DEBUG=true
          APP_URL=http://127.0.0.1:8080
          LOG_CHANNEL=stderr
          LOG_LEVEL=debug
          DB_CONNECTION=null
          SESSION_DRIVER=array
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          DYNAMODB_TABLE=burnnote
          DYNAMODB_ENDPOINT=http://127.0.0.1:8000
          AWS_REGION=ap-northeast-1
          AWS_ACCESS_KEY_ID=test
          AWS_SECRET_ACCESS_KEY=test
          BURNNOTE_MAX_CIPHERTEXT_BYTES=16384
          BURNNOTE_MAX_EXPIRES_SEC=604800
          EOF
        working-directory: api

      - name: Start Laravel
        run: |
          nohup php artisan serve --host=127.0.0.1 --port=8080 > /tmp/laravel.log 2>&1 &
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8080/health > /dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8080/health
        working-directory: api

      - name: Smoke test API (POST /api/notes)
        run: |
          curl -sfw '\n[%{http_code}]\n' -X POST http://127.0.0.1:8080/api/notes \
            -H 'Content-Type: application/json' \
            -d '{"ciphertext":"Y2lwaGVy","iv":"MTIzNDU2Nzg5MGFi","expires_in":3600}'

      - name: Start SvelteKit dev
        run: |
          nohup pnpm dev --host 127.0.0.1 --port 5173 > /tmp/sveltekit.log 2>&1 &
          for i in {1..30}; do
            curl -sf http://127.0.0.1:5173/ > /dev/null && break
            sleep 1
          done
          curl -sfI http://127.0.0.1:5173/
        working-directory: web

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo '--- laravel.log ---'
          cat /tmp/laravel.log || true
          echo '--- sveltekit.log ---'
          cat /tmp/sveltekit.log || true

  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - uses: tommykey-apps/.github/.github/actions/terraform-plan@v1
        with:
          working-directory: infra
