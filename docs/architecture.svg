<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 640" font-family="system-ui,-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif" style="background:#ffffff">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ED7100" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3F8624" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8C4FFF" />
    </marker>
    <style>
      .title  { font-size:22px; font-weight:700; fill:#111 }
      .nlabel { font-size:12px; font-weight:600; fill:#111; text-anchor:middle }
      .nsub   { font-size:10px; fill:#333; text-anchor:middle }
      .elabel { font-size:11px; fill:#222; text-anchor:middle }
      .hint   { font-size:11px; fill:#5a4a00 }
      .zknote { font-size:12px; fill:#244d24 }
    </style>
  </defs>

  <!-- Title -->
  <text x="650" y="36" class="title" text-anchor="middle">burnnote — Serverless + Zero-knowledge architecture</text>

  <!-- Legend: Browser encryption callout -->
  <rect x="30" y="380" width="220" height="70" rx="8" ry="8" fill="#FFF8D6" stroke="#D6B656" stroke-width="1.5"/>
  <text x="140" y="402" class="hint" text-anchor="middle" font-weight="700">Browser (WebCrypto API)</text>
  <text x="140" y="420" class="hint" text-anchor="middle">AES-256-GCM encrypt / decrypt</text>
  <text x="140" y="438" class="hint" text-anchor="middle" font-style="italic">key stays in URL fragment (#)</text>

  <!-- Zero-knowledge explanation -->
  <rect x="860" y="90" width="420" height="110" rx="8" ry="8" fill="#D9EAD3" stroke="#82B366" stroke-width="1.5"/>
  <text x="870" y="115" class="zknote" font-weight="700">Zero-knowledge</text>
  <text x="870" y="135" class="zknote">• Server stores only ciphertext + IV</text>
  <text x="870" y="153" class="zknote">• Decryption key lives in URL fragment (#)</text>
  <text x="870" y="171" class="zknote">• Fragment is never sent in HTTP requests</text>
  <text x="870" y="189" class="zknote">• Not in Referer, not in access logs, not in CloudFront logs</text>

  <!-- User -->
  <g>
    <circle cx="90" cy="290" r="26" fill="#ffffff" stroke="#5D5D5D" stroke-width="2"/>
    <circle cx="90" cy="282" r="8" fill="#5D5D5D"/>
    <path d="M70,308 Q90,292 110,308 L110,316 L70,316 Z" fill="#5D5D5D"/>
    <text x="90" y="345" class="nlabel">User</text>
  </g>

  <!-- Route 53 -->
  <g>
    <rect x="60" y="160" width="60" height="60" rx="8" ry="8" fill="#8C4FFF" stroke="#8C4FFF"/>
    <text x="90" y="185" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">Route</text>
    <text x="90" y="200" fill="#fff" font-size="11" text-anchor="middle" font-weight="700">53</text>
    <text x="90" y="242" class="nsub">tommykeyapp.com zone</text>
  </g>

  <!-- ACM -->
  <g>
    <rect x="280" y="160" width="60" height="60" rx="8" ry="8" fill="#DD344C" stroke="#DD344C"/>
    <text x="310" y="189" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">ACM</text>
    <text x="310" y="204" fill="#fff" font-size="9" text-anchor="middle">cert</text>
    <text x="310" y="242" class="nsub">*.tommykeyapp.com (us-east-1)</text>
  </g>

  <!-- CloudFront -->
  <g>
    <rect x="280" y="270" width="60" height="60" rx="8" ry="8" fill="#ED7100" stroke="#ED7100"/>
    <text x="310" y="295" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">Cloud</text>
    <text x="310" y="308" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">Front</text>
    <text x="310" y="352" class="nsub">burnnote.tommykeyapp.com</text>
  </g>

  <!-- OAC label -->
  <rect x="430" y="235" width="52" height="20" rx="4" ry="4" fill="#FFF2CC" stroke="#D6B656"/>
  <text x="456" y="249" font-size="10" text-anchor="middle" fill="#7a6000">OAC</text>

  <!-- S3 Frontend -->
  <g>
    <rect x="520" y="160" width="60" height="60" rx="8" ry="8" fill="#3F8624" stroke="#3F8624"/>
    <text x="550" y="189" fill="#fff" font-size="11" text-anchor="middle" font-weight="700">S3</text>
    <text x="550" y="204" fill="#fff" font-size="9" text-anchor="middle">static</text>
    <text x="550" y="242" class="nsub">SvelteKit build/</text>
  </g>

  <!-- API Gateway -->
  <g>
    <rect x="520" y="270" width="60" height="60" rx="8" ry="8" fill="#ED7100" stroke="#ED7100"/>
    <text x="550" y="293" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">API GW</text>
    <text x="550" y="307" fill="#fff" font-size="9" text-anchor="middle">HTTP API</text>
    <text x="550" y="352" class="nsub">$default → Lambda</text>
  </g>

  <!-- Lambda -->
  <g>
    <rect x="740" y="270" width="60" height="60" rx="8" ry="8" fill="#ED7100" stroke="#ED7100"/>
    <text x="770" y="290" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">λ</text>
    <text x="770" y="305" fill="#fff" font-size="9" text-anchor="middle">Lambda</text>
    <text x="770" y="317" fill="#fff" font-size="9" text-anchor="middle">arm64</text>
    <text x="770" y="352" class="nsub">PHP 8.4 + Laravel 13</text>
    <text x="770" y="367" class="nsub">Bref v3 unified layer</text>
  </g>

  <!-- IAM -->
  <rect x="830" y="285" width="90" height="34" rx="6" ry="6" fill="#E1D5E7" stroke="#9673A6"/>
  <text x="875" y="300" font-size="10" text-anchor="middle" fill="#5a3a82" font-weight="700">IAM Role</text>
  <text x="875" y="313" font-size="9" text-anchor="middle" fill="#5a3a82">DynamoDB CRUD</text>

  <!-- DynamoDB -->
  <g>
    <rect x="980" y="270" width="60" height="60" rx="8" ry="8" fill="#3F8624" stroke="#3F8624"/>
    <text x="1010" y="292" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">Dynamo</text>
    <text x="1010" y="306" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">DB</text>
    <text x="1010" y="352" class="nsub">notes table</text>
    <text x="1010" y="367" class="nsub">On-Demand + TTL</text>
  </g>

  <!-- CloudWatch Logs -->
  <g>
    <rect x="740" y="430" width="60" height="60" rx="8" ry="8" fill="#E7157B" stroke="#E7157B"/>
    <text x="770" y="453" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">CloudW</text>
    <text x="770" y="467" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">Logs</text>
    <text x="770" y="512" class="nsub">7-day retention</text>
  </g>

  <!-- SSM -->
  <g>
    <rect x="980" y="430" width="60" height="60" rx="8" ry="8" fill="#4D72F3" stroke="#4D72F3"/>
    <text x="1010" y="455" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">SSM</text>
    <text x="1010" y="469" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">Params</text>
    <text x="1010" y="512" class="nsub">CF id + bucket name</text>
  </g>

  <!-- GitHub Actions -->
  <g>
    <rect x="280" y="430" width="60" height="60" rx="8" ry="8" fill="#24292E" stroke="#24292E"/>
    <text x="310" y="453" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">GitHub</text>
    <text x="310" y="466" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">Actions</text>
    <text x="310" y="512" class="nsub">ci.yaml / cd.yaml</text>
  </g>

  <!-- Terraform -->
  <g>
    <rect x="400" y="430" width="60" height="60" rx="8" ry="8" fill="#7B42BC" stroke="#7B42BC"/>
    <text x="430" y="455" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">TF</text>
    <text x="430" y="470" fill="#fff" font-size="9" text-anchor="middle">S3 backend</text>
    <text x="430" y="512" class="nsub">infra/*.tf</text>
  </g>

  <!-- Arrows -->
  <!-- User → Route53 (DNS) -->
  <path d="M90,264 L90,220" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="105" y="244" class="elabel" text-anchor="start">DNS</text>

  <!-- Route53 → CloudFront (arrow going right-down) -->
  <path d="M120,200 L255,285" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-purple)"/>

  <!-- ACM → CloudFront -->
  <path d="M310,220 L310,270" stroke="#DD344C" stroke-width="2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>
  <text x="315" y="248" class="elabel" text-anchor="start">SSL</text>

  <!-- User → CloudFront -->
  <path d="M118,290 L280,300" stroke="#ED7100" stroke-width="2.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="200" y="287" class="elabel" font-weight="700">HTTPS</text>

  <!-- CloudFront → S3 -->
  <path d="M340,285 L520,200" stroke="#3F8624" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="450" y="235" class="elabel">/ (SPA)</text>

  <!-- CloudFront → API Gateway -->
  <path d="M340,305 L520,300" stroke="#ED7100" stroke-width="2.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="430" y="295" class="elabel" font-weight="700">/api/*</text>

  <!-- API Gateway → Lambda -->
  <path d="M580,300 L740,300" stroke="#ED7100" stroke-width="2.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="660" y="293" class="elabel">$default</text>

  <!-- Lambda → DynamoDB -->
  <path d="M800,300 L980,300" stroke="#3F8624" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="890" y="293" class="elabel">Put / CondDelete</text>

  <!-- Lambda → CloudWatch Logs -->
  <path d="M770,330 L770,430" stroke="#E7157B" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)"/>

  <!-- GitHub Actions → S3 -->
  <path d="M340,435 L540,225" stroke="#24292E" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)"/>
  <text x="440" y="330" class="elabel" fill="#24292E">deploy-web</text>

  <!-- GitHub Actions → Lambda -->
  <path d="M340,455 L740,330" stroke="#24292E" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)"/>
  <text x="600" y="415" class="elabel" fill="#24292E">deploy-api (zip)</text>

  <!-- GitHub Actions → Terraform -->
  <path d="M340,460 L400,460" stroke="#7B42BC" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)"/>

  <!-- Terraform → SSM (writes) -->
  <path d="M460,460 L980,460" stroke="#4D72F3" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)"/>
  <text x="720" y="453" class="elabel" fill="#4D72F3">writes SSM params</text>

  <!-- Browser encryption → User (hint) -->
  <line x1="140" y1="380" x2="90" y2="320" stroke="#D6B656" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Footer legend -->
  <g transform="translate(40,580)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#444">Legend:</text>
    <line x1="60" y1="-4" x2="100" y2="-4" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="105" y="0" font-size="11" fill="#444">DNS / control</text>
    <line x1="220" y1="-4" x2="260" y2="-4" stroke="#ED7100" stroke-width="2.5"/>
    <text x="265" y="0" font-size="11" fill="#444">Request path</text>
    <line x1="360" y1="-4" x2="400" y2="-4" stroke="#3F8624" stroke-width="2.5"/>
    <text x="405" y="0" font-size="11" fill="#444">Data path</text>
    <line x1="490" y1="-4" x2="530" y2="-4" stroke="#24292E" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="535" y="0" font-size="11" fill="#444">CI/CD deploy</text>
  </g>
</svg>
